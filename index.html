<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fokus</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <figure class="app_logo-figure">
          <img class="app_logo-figure" src="./imagens/logo.png" alt="" />
        </figure>
      </header>
      <section class="app_section-banner-container">
        <h1 class="app_title">
          Otimize sua produtividade,
          <br />
          <strong class="app_title-strong">mergulhe no que importa</strong>
        </h1>
        <figure class="app_image-figure">
          <img class="app_image" src="./imagens/foco.png" alt="" />
        </figure>
      </section>
      <section class="app_section-card-container">
        <div>
          <ul class="app_card-list">
            <li class="app_card-list-item">
              <button
                data-context="foco"
                class="app_card-button app_card-button--foco active"
              >
                Foco
              </button>
            </li>
            <li class="app_card-list-item">
              <button
                data-context="short"
                class="app_card-button app_card-button--curto"
              >
                Descanso curto
              </button>
            </li>
            <li class="app_card-list-item">
              <button
                data-context="long"
                class="app_card-button app_card-button--longo"
              >
                Descanso longo
              </button>
            </li>
          </ul>
          <div class="app_card-timer" id="timer"></div>
          <ul>
            <li class="app_card-list-item">
              <label class="toggle">
                <input
                  class="toggle-checkbox"
                  type="checkbox"
                  id="alternar-musica"
                />
                <div class="toggle-switch"></div>
              </label>
            </li>
            <li class="app_card-list-item">
              <label class="app_card-list-label" for="alternar-musica"
                >Música</label
              >
            </li>
          </ul>
          <div class="app_card-primary-button-wrapper">
            <button id="start-paude" class="app_card-primary-button">
              <img
                class="app_card-primary-button-icon"
                src="./imagens/play_arrow.png"
                alt=""
              />
              <span>Começar</span>
            </button>
          </div>
        </div>
      </section>
      <footer class="app_footer">
        <p class="app_footer-text">
          "Projeto ficticio e sem fins comerciais. Imagens geradas por IA no
          Adobe Firfly."
        </p>
      </footer>
    </main>
  </body>
</html>
